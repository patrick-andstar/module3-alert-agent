<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DLP Alert Agent Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="rail">
        <div class="brand">
          <span class="mark">DLP</span>
          <div>
            <h1>DLP Alert Agent Console</h1>
            <p>模块三场景触发台</p>
          </div>
        </div>
        <label class="token">
          <span>Admin Token</span>
          <input id="adminToken" autocomplete="off" placeholder="未配置可留空" />
        </label>
        <section class="scenario-list" id="scenarioList" aria-label="业务场景"></section>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <div>
            <p class="eyebrow">MySQL-backed flow</p>
            <h2 id="activeTitle">选择一个业务场景</h2>
          </div>
          <button class="ghost" id="refreshButton" type="button">刷新记录</button>
        </header>

        <section class="status-grid">
          <article>
            <span>告警查询记录</span>
            <strong id="alertCount">0</strong>
          </article>
          <article>
            <span>误报库记录</span>
            <strong id="fpCount">0</strong>
          </article>
          <article>
            <span>白名单记录</span>
            <strong id="whitelistCount">0</strong>
          </article>
        </section>

        <section class="panels">
          <article class="panel primary">
            <div class="panel-head">
              <h3>场景输入</h3>
              <span id="scenarioBadge">等待触发</span>
            </div>
            <pre id="scenarioInput">{}</pre>
          </article>
          <article class="panel">
            <div class="panel-head">
              <h3>执行输出</h3>
              <span id="runState">idle</span>
            </div>
            <pre id="runOutput">点击左侧按钮后显示完整请求与响应。</pre>
          </article>
        </section>

        <section class="records">
          <article class="panel">
            <div class="panel-head">
              <h3>alert_logs</h3>
              <span>POST /api/alerts/query</span>
            </div>
            <pre id="alertsOutput">[]</pre>
          </article>
          <article class="panel">
            <div class="panel-head">
              <h3>false_positive_library</h3>
              <span>GET /api/false-positives</span>
            </div>
            <pre id="fpOutput">[]</pre>
          </article>
          <article class="panel">
            <div class="panel-head">
              <h3>whitelist_rules</h3>
              <span>GET /api/whitelist</span>
            </div>
            <pre id="whitelistOutput">[]</pre>
          </article>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
